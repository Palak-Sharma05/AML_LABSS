server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ =404;
    }

    # Optional: Enable access logs for debugging
    # access_log /var/log/nginx/access.log;
    # error_log /var/log/nginx/error.log;
}
